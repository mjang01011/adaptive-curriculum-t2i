# Spatial anchored with qwen_logit_grpo_target_heavy reward + strong KL.
# Motivation: pseudo_soft spatial probe dropped -0.094 at step 0 with lr=5e-5/beta=0.02
# and -0.05+ with lr=2e-5/beta=0.05. Switching to continuous logit reward (denser signal)
# with aggressive KL regularization (beta=0.1) to prevent policy drift.
# One VLM forward pass per question per image — ~3x slower than pseudo_soft per step.
#
# Usage: EXPERIMENT=spatial_anchored_qwen_logit_stable STRATEGY=fixed_bucket sbatch train_curriculum.sh

fixed_bucket: spatial_relations_anchored

training:
  num_curriculum_steps: 30
  gradient_steps_per_curriculum_step: 4
  train_batch_size: 4
  learning_rate: 2.0e-5
  max_grad_norm: 1.0
  save_checkpoints: true
  save_every: 5

grpo:
  num_samples: 6
  beta: 0.1
  cfg_scale_train: 2.0
  reward_mode: qwen_logit_grpo_target_heavy
  logprob_reduction: sum_sqrt_len
  advantage_eps: 1.0e-4

lora:
  rank: 16
  alpha: 32
  dropout: 0.0
  start_layer: 0
  target_modules: [wqkv, wo]

evaluation:
  cfg_scale: 2.0
  full_eval_every_curriculum_step: 10
  num_val_prompts_per_bucket: 20
  num_samples_per_prompt: 4
  reward_mode: hard_target
  eval_probe_fixed: true
  probe_num_prompts: 8
  probe_seeds: [0, 1, 2, 3]
  eval_probe_every: 2

early_stop:
  enabled: true
  min_delta_from_base: -0.05
  patience_probes: 2
  kl_threshold: 5.0
  presence_drop_threshold: 0.15

ucb:
  c: 0.25
  epsilon: 0.1
