# Phase 1 gatekeeper v3: attribute_binding with target-heavy GRPO reward.
# Key change from v2: pseudo_soft_grpo_target_heavy reweights grpo_reward_questions
# so attribute positives get 0.60 combined weight (vs 0.40 in v2), making reward
# more aligned with hard_target eval.
# Includes fixed probe eval every 2 steps for stable online signal.
#
# Usage: EXPERIMENT=attribute_only_overfit_v3 STRATEGY=fixed_bucket sbatch train_curriculum.sh

fixed_bucket: attribute_binding

training:
  num_curriculum_steps: 20
  gradient_steps_per_curriculum_step: 4
  train_batch_size: 4
  learning_rate: 5.0e-5
  max_grad_norm: 1.0
  save_checkpoints: true
  save_every: 5

grpo:
  num_samples: 6
  beta: 0.02
  cfg_scale_train: 2.0
  reward_mode: pseudo_soft_grpo_target_heavy
  logprob_reduction: sum_sqrt_len
  advantage_eps: 1.0e-4

lora:
  rank: 16
  alpha: 32
  dropout: 0.0
  start_layer: 0
  target_modules: [wqkv, wo]

evaluation:
  cfg_scale: 2.0
  full_eval_every_curriculum_step: 10
  num_val_prompts_per_bucket: 20
  num_samples_per_prompt: 4
  reward_mode: hard_target
  eval_probe_fixed: true
  probe_num_prompts: 8
  probe_seeds: [0, 1, 2, 3]
  eval_probe_every: 2

ucb:
  c: 0.25
  epsilon: 0.1
