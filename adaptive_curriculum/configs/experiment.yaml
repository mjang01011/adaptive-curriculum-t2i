seed: 42
project_name: llamagen_ucb_curriculum

paths:
  repo_root: /vol/repo/LlamaGen
  data_root: /vol/data
  pretrained_root: /vol/pretrained_models
  output_root: /vol/outputs/runs
  t5_cache_dir: /vol/data/t5_cache   # set to null to use live T5 inference

model:
  image_size: 256
  gpt_model: GPT-XL
  vq_model: VQ-16
  t5_model_type: flan-t5-xl
  t5_path: /vol/pretrained_models/t5-ckpt
  t5_feature_max_len: 120
  vq_ckpt: /vol/pretrained_models/vq_ds16_t2i.pt
  gpt_ckpt: /vol/pretrained_models/t2i_XL_stage1_256.pt
  codebook_size: 16384
  codebook_embed_dim: 8
  downsample_size: 16
  cls_token_num: 120
  cfg_scale: 2.0          # generation CFG for eval and sampling
  temperature: 1.0
  top_k: 1000
  top_p: 1.0
  use_lora: true
  mixed_precision: bf16

lora:
  rank: 16
  alpha: 32
  dropout: 0.0
  start_layer: 0
  target_modules:
    - wqkv
    - wo

buckets:
  names:
    - attribute_binding
    - counting
    - spatial_relations_anchored
    - complex_composition
  train_file: "{bucket}_train_500.jsonl"
  val_file: "{bucket}_val_20.jsonl"

training:
  strategy: ucb
  num_curriculum_steps: 200
  gradient_steps_per_curriculum_step: 32
  train_batch_size: 4
  learning_rate: 1.0e-5
  max_grad_norm: 1.0
  save_every: 20

grpo:
  num_samples: 8            # images generated per prompt per GRPO step (G)
  beta: 0.01                # KL penalty weight; set 0.0 to disable
  cfg_scale_train: 2.0      # CFG scale for GRPO generation (matches eval CFG)
  reward_mode: pseudo_soft_grpo  # GRPO reward: hard_target | pseudo_soft_target | pseudo_soft_grpo | true_soft
  logprob_reduction: sum_sqrt_len  # mean | sum | sum_sqrt_len
  advantage_eps: 1.0e-4     # added to reward std to prevent zero-std amplification

evaluation:
  eval_every_curriculum_step: 1
  full_eval_every_curriculum_step: 10
  num_val_prompts_per_bucket: 20    # matches the 20-item val split
  num_samples_per_prompt: 2
  reward_model: qwen3vl                        # heuristic | vlm (claude) | qwen3vl
  vlm_model: Qwen/Qwen3-VL-2B-Instruct
  reward_mode: hard_target   # eval/UCB always uses hard_target for clean signal
  cfg_scale: 2.0

ucb:
  c: 0.25
  epsilon: 0.1       # epsilon-greedy exploration after initial forced round-robin
  reward_ma_beta: 0.8
  improvement_ma_beta: 0.8
  initialize_with_base_eval: true

static_curriculum:
  phases:
    - buckets: ["attribute_binding"]
      steps: 50
    - buckets: ["attribute_binding", "counting"]
      steps: 50
    - buckets: ["attribute_binding", "counting", "spatial_relations_anchored"]
      steps: 50
    - buckets: ["attribute_binding", "counting", "spatial_relations_anchored", "complex_composition"]
      steps: 50

logging:
  use_wandb: true
  wandb_project: llamagen-adaptive-curriculum
  wandb_entity: null        # your W&B username or team
  run_name: null            # auto-generated from run dir if null
  log_jsonl: true
